name: Docker

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  GHCR_REGISTRY: ghcr.io
  DOCKERHUB_REGISTRY: docker.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  build-images:
    name: Build (${{ matrix.name }}, ${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # mcp-server: amd64
          - name: mcp-server
            context: .
            dockerfile: packages/mcp-server/Dockerfile
            dockerhub: hadijannat/aas-mcp-server
            platform: linux/amd64
            runner: ubuntu-latest
          # mcp-server: arm64 (native runner, no QEMU)
          - name: mcp-server
            context: .
            dockerfile: packages/mcp-server/Dockerfile
            dockerhub: hadijannat/aas-mcp-server
            platform: linux/arm64
            runner: ubuntu-24.04-arm
          # web-ui: amd64 only
          - name: web-ui
            context: .
            dockerfile: packages/web-ui/Dockerfile
            dockerhub: hadijannat/aas-web-ui
            platform: linux/amd64
            runner: ubuntu-latest
          # validation-service: amd64
          - name: validation-service
            context: packages/validation-service
            dockerfile: packages/validation-service/Dockerfile
            dockerhub: hadijannat/aas-validation-service
            platform: linux/amd64
            runner: ubuntu-latest
          # validation-service: arm64 (native runner, no QEMU)
          - name: validation-service
            context: packages/validation-service
            dockerfile: packages/validation-service/Dockerfile
            dockerhub: hadijannat/aas-validation-service
            platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request' && env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v4
        with:
          registry: ${{ env.DOCKERHUB_REGISTRY }}
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Compute platform slug
        id: slug
        run: echo "arch=${PLATFORM#*/}" >> "$GITHUB_OUTPUT"
        env:
          PLATFORM: ${{ matrix.platform }}

      - name: Extract metadata for GHCR
        id: meta-ghcr
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.GHCR_REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.name }}
          tags: |
            type=ref,event=branch,suffix=-${{ steps.slug.outputs.arch }}
            type=ref,event=pr,suffix=-${{ steps.slug.outputs.arch }}
            type=semver,pattern={{version}},suffix=-${{ steps.slug.outputs.arch }}
            type=semver,pattern={{major}}.{{minor}},suffix=-${{ steps.slug.outputs.arch }}
            type=sha,suffix=-${{ steps.slug.outputs.arch }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-ghcr.outputs.tags }}
          labels: ${{ steps.meta-ghcr.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}-${{ steps.slug.outputs.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}-${{ steps.slug.outputs.arch }}

  # Create multi-arch manifest lists combining per-platform images
  create-manifests:
    name: Manifest (${{ matrix.name }})
    needs: build-images
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: mcp-server
            dockerhub: hadijannat/aas-mcp-server
            platforms: linux/amd64,linux/arm64
          - name: web-ui
            dockerhub: hadijannat/aas-web-ui
            platforms: linux/amd64
          - name: validation-service
            dockerhub: hadijannat/aas-validation-service
            platforms: linux/amd64,linux/arm64

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v4
        with:
          registry: ${{ env.DOCKERHUB_REGISTRY }}
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.GHCR_REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.name }}
            ${{ env.DOCKERHUB_REGISTRY }}/${{ matrix.dockerhub }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Create and push multi-arch manifests
        run: |
          GHCR_IMAGE="${GHCR_REGISTRY}/${IMAGE_PREFIX}/${NAME}"
          DOCKERHUB_IMAGE="${DOCKERHUB_REGISTRY}/${DOCKERHUB}"

          # Parse platforms into arch list
          IFS=',' read -ra PLATFORMS <<< "${PLATFORMS_CSV}"
          ARCH_SUFFIXES=()
          for plat in "${PLATFORMS[@]}"; do
            ARCH_SUFFIXES+=("${plat#*/}")
          done

          # For each tag, create a manifest from the per-arch tags
          while IFS= read -r TAG; do
            [ -z "${TAG}" ] && continue

            # GHCR manifest
            GHCR_SOURCES=()
            for arch in "${ARCH_SUFFIXES[@]}"; do
              GHCR_SOURCES+=("${GHCR_IMAGE}:${TAG}-${arch}")
            done
            echo "Creating GHCR manifest: ${GHCR_IMAGE}:${TAG}"
            docker buildx imagetools create -t "${GHCR_IMAGE}:${TAG}" "${GHCR_SOURCES[@]}" || true

            # Docker Hub manifest (if configured)
            if [ -n "${DOCKERHUB_USERNAME}" ] && [ -n "${DOCKERHUB_TOKEN}" ]; then
              DOCKERHUB_SOURCES=()
              for arch in "${ARCH_SUFFIXES[@]}"; do
                DOCKERHUB_SOURCES+=("${GHCR_IMAGE}:${TAG}-${arch}")
              done
              echo "Creating Docker Hub manifest: ${DOCKERHUB_IMAGE}:${TAG}"
              docker buildx imagetools create -t "${DOCKERHUB_IMAGE}:${TAG}" "${DOCKERHUB_SOURCES[@]}" || true
            fi
          done <<< "${TAGS}"
        env:
          NAME: ${{ matrix.name }}
          DOCKERHUB: ${{ matrix.dockerhub }}
          PLATFORMS_CSV: ${{ matrix.platforms }}
          TAGS: ${{ steps.meta.outputs.version }}
